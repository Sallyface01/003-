workflows:
  fishbuddy-android:
    name: FishBuddy Android Build
    max_build_duration: 60
    environment:
      java: 17
    scripts:
      - name: Fix Gradle Wrapper
        script: |
          # Ensure exec permission (sometimes lost from Windows git)
          chmod +x gradlew

          # Switch distributionUrl from local path to HTTPS (for CI)
          echo ">> Switching to remote Gradle distribution URL..."
          sed -i 's|file\\\\:///d:/code/Gradle/gradle-8.9-bin.zip|https\\://services.gradle.org/distributions/gradle-8.9-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          echo ">> distributionUrl: $(grep distributionUrl gradle/wrapper/gradle-wrapper.properties)"

          # Always replace wrapper jar — repo copy is likely corrupted by git CRLF conversion
          echo ">> Replacing gradle-wrapper.jar with a fresh copy..."
          curl -sSL "https://services.gradle.org/distributions/gradle-8.9-bin.zip" -o /tmp/gradle-8.9.zip
          unzip -qo /tmp/gradle-8.9.zip "*/gradle-wrapper*.jar" -d /tmp/gradle-extract/
          WRAPPER_JAR=$(find /tmp/gradle-extract -name "gradle-wrapper*.jar" | head -1)
          cp "$WRAPPER_JAR" gradle/wrapper/gradle-wrapper.jar
          echo ">> gradle-wrapper.jar replaced OK ($(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes)"
      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
